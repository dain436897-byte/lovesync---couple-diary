<body>
  <div id="root"></div>
  <script>
    window.errorLogs = [];
    const originalError = console.error;
    console.error = function (...args) {
      window.errorLogs.push(args.join(' '));
      let div = document.getElementById('debug-error-logger');
      if (!div) {
        div = document.createElement('div');
        div.id = 'debug-error-logger';
        div.style.cssText = 'position:fixed;bottom:10px;left:10px;background:rgba(255,0,0,0.8);color:white;padding:10px;z-index:9999;max-width:300px;font-size:12px;border-radius:4px;word-wrap:break-word;pointer-events:none;';
        document.body.appendChild(div);
      }
      div.innerText = window.errorLogs.join('\n');
      originalError.apply(console, args);
    };
  </script>
</body>
